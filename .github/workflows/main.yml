name: 从源仓库复制文件

on:
  workflow_dispatch:

jobs:
  copy-files:
    runs-on: ubuntu-latest
    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 检出源仓库
        uses: actions/checkout@v4
        with:
          repository: qiongyuyu/todolist
          path: temp-source
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 复制文件（包括所有子文件夹）
        run: |
          cp -r temp-source/* ./ 2>/dev/null || true
          cp -r temp-source/.[!.]* ./ 2>/dev/null || true
          rm -rf temp-source

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "从源仓库复制文件 $(date '+%Y-%m-%d %H:%M:%S')" || echo "没有需要提交的变化"
          git push
